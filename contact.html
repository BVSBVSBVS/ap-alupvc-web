<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | AP ALUPVC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">
    <header class="navbar">
        <div class="logo"><span class="logo-box">AP</span> ALUPVC</div>
        <nav class="nav-links">
            <a href="index.html">POČETNA</a>
            <a href="about.html">O NAMA</a>
            <a href="services.html">USLUGE</a>
            <a href="gallery.html">GALERIJA</a>
            <a href="calculator.html">KALKULATOR</a>
        </nav>
        <div class="nav-controls">
            <button id="theme-toggle" class="nav-btn">🌗</button>
            <a href="contact.html" class="btn-contact active">KONTAKT ↗</a>
        </div>
    </header>

    <main class="page-container contact-page">
        <div class="page-header">
            <p class="subtitle">HAJDE DA ZAJEDNO PROJEKTUJEMO VAŠ SLEDEĆI PROJEKAT</p>
            <h1 class="main-title">Kontakt</h1>
        </div>

        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-block">
                    <p class="label">ADRESA</p>
                    <p>Industrijska zona 123, Beograd, Srbija</p>
                </div>
                <div class="info-block">
                    <p class="label">TELEFON</p>
                    <p>+381 11 123 4567</p>
                </div>
                <div class="info-block">
                    <p class="label">EMAIL</p>
                    <p>info@alupvc-pro.rs</p>
                </div>
                <div class="info-block">
                    <p class="label">RADNO VREME</p>
                    <p>Pon — Pet: 08:00 — 17:00</p>
                </div>
            </div>

            <div class="contact-form-container">
                <form class="contact-form">
                    <div class="form-group">
                        <label>IME I PREZIME</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>EMAIL ADRESA</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group full-width">
                        <label>BROJ TELEFONA</label>
                        <input type="tel">
                    </div>
                    <div class="form-group full-width">
                        <label>DETALJI PROJEKTA</label>
                        <textarea rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn-primary full-width">Pošalji poruku</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
